<script>

// Cambia la lógica de captura para asegurar que el evento se detenga si hay error
document.getElementById("261316732746661").onsubmit = function(e) {
    var cedula = document.getElementById("input_115_full").value;
    
// Eliminar espacios
        cedula = cedula.trim();
		
		if (error) {
			alert("Mensaje de error");
			e.preventDefault(); // Detiene el envío del formulario
			return false;
		}

        // Validar longitud y solo números
        if (!/^\d{10}$/.test(cedula)) {
            alert("La cédula debe tener exactamente 10 números.");
            return false;
        }

        // Validar provincia
        var provincia = parseInt(cedula.substring(0, 2));

        if (provincia < 1 || provincia > 24) {
            alert("Código de provincia inválido.");
            return false;
        }

        // Algoritmo de validación
        var suma = 0;

        for (var i = 0; i < 9; i++) {

            var digito = parseInt(cedula.charAt(i));

            if (i % 2 === 0) {
                digito *= 2;

                if (digito > 9) {
                    digito -= 9;
                }
            }

            suma += digito;
        }

        var decenaSuperior = Math.ceil(suma / 10) * 10;
        var digitoValidador = decenaSuperior - suma;

        if (digitoValidador === 10) {
            digitoValidador = 0;
        }

        var ultimoDigito = parseInt(cedula.charAt(9));

        if (digitoValidador !== ultimoDigito) {
            alert("Cédula ecuatoriana inválida.");
            return false;
        }
		
		
        return true;

    };


</script>
